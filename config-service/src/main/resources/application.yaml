spring:
  application:
    name: config-service

  cloud:
    config.server.git:
      uri: https://github.com/RakshithDB1/Distributed-AI-Project-Companion-Config-Server
      username: RakshithDB1
      password:  ${GIT_PASSWORD}
      default-label: main

server.port: 8888

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    config:
      enabled: false

---

spring:
  config:
    activate:
      on-profile: k8s

  cloud:
    discovery:
      enabled: false
    config.server.git:
      uri: https://github.com/RakshithDB1/Distributed-AI-Project-Companion-Config-Server
      username: ${GIT_USERNAME}
      password: ${GIT_PASSWORD}
      default-label: main
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false